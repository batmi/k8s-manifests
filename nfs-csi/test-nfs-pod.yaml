apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-nfs-pvc
spec:
  accessModes:
    - ReadWriteMany # 🌟 여러 노드의 파드가 동시에 읽기/쓰기 가능하도록 설정
  storageClassName: nfs-storage # 🔗 위에서 생성한 NFS 스토리지 클래스 지정
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: test-nfs-pod-a
spec:
  containers:
    - name: web-server
      image: nginx:alpine
      volumeMounts:
        - name: nfs-volume
          mountPath: /usr/share/nginx/html # Nginx의 웹 루트 경로에 마운트
  volumes:
    - name: nfs-volume
      persistentVolumeClaim:
        claimName: test-nfs-pvc
---
apiVersion: v1
kind: Pod
metadata:
  name: test-nfs-pod-b
spec:
  containers:
    - name: web-server
      image: nginx:alpine
      volumeMounts:
        - name: nfs-volume
          mountPath: /usr/share/nginx/html
  volumes:
    - name: nfs-volume
      persistentVolumeClaim:
        claimName: test-nfs-pvc
