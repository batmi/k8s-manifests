  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: my-haproxy-kubernetes-ingress-proxy
        app.kubernetes.io/instance: my-haproxy
    spec:
      restartPolicy: Never
      serviceAccountName: my-haproxy-kubernetes-ingress-crdjob
      securityContext:
        runAsNonRoot: true
        runAsUser:  1000
        runAsGroup: 1000
      containers:
        - name: crd
          image: "docker.io/haproxytech/kubernetes-ingress:3.2.12"
          imagePullPolicy: IfNotPresent
          command:
            - /haproxy-ingress-controller
            - --job-check-crd
