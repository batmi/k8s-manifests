apiVersion: batch/v1
kind: Job
metadata:
  name: my-haproxy-kubernetes-ingress-crdjob
  namespace: haproxy-ingress
  labels:
    app.kubernetes.io/name: my-haproxy-kubernetes-ingress-proxy
    app.kubernetes.io/instance: my-haproxy
    helm.sh/chart: kubernetes-ingress-1.52.1
    app.kubernetes.io/version: "3.2.12"
    app.kubernetes.io/managed-by: Helm
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    helm.sh/hook: post-install,pre-upgrade
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
