apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: macvlan-worker1-nad         
  namespace: default
spec:
  config: '{
      "cniVersion": "0.3.1",
      "name": "macvlan-network-w1",
      "type": "macvlan",
      "mode": "bridge",
      "master": "enp0s9",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.200.0/24",
        "rangeStart": "192.168.200.111",
        "rangeEnd": "192.168.200.111",
        "gateway": "192.168.200.1"
      }
    }'
